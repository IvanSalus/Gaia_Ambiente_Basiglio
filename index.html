<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --forest:#2D5016;--forest2:#3a6b1e;--leaf:#5a8f2a;--lime:#8BC34A;
  --earth:#6D4C28;--sand:#F5E6C8;--cream:#FBF7F0;
  --orange:#E07B39;--orange2:#c96820;
  --red:#D32F2F;--yellow:#F9A825;--green:#388E3C;
  --border:#dde8cc;--bg:#f2f5ed;--muted:#789060;
  --lblue:#eaf4de;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:#222}
button,input,select,textarea{font-family:inherit}
/* HEADER */
#hdr{position:fixed;top:0;left:0;right:0;height:52px;background:var(--forest);color:#fff;
  display:flex;align-items:center;gap:10px;padding:0 14px;z-index:400;box-shadow:0 2px 8px rgba(0,0,0,.25)}
#hamburger{background:none;border:none;color:#fff;font-size:24px;cursor:pointer;padding:4px 8px;border-radius:6px;flex-shrink:0}
#hamburger:hover{background:rgba(255,255,255,.15)}
.hdr-info{flex:1;overflow:hidden}
.hdr-title{font-size:14px;font-weight:700}
.hdr-sub{font-size:9px;opacity:.65;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* DRAWER */
#drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500}
#drawer-overlay.open{display:block}
#sidebar{position:fixed;top:0;left:-270px;bottom:0;width:250px;background:#fff;z-index:600;
  display:flex;flex-direction:column;box-shadow:4px 0 24px rgba(0,0,0,.2);
  transition:left .25s cubic-bezier(.4,0,.2,1);overflow-y:auto}
#sidebar.open{left:0}
.sb-hdr{background:var(--forest);color:#fff;padding:16px 16px 14px;flex-shrink:0;position:relative}
.sb-logo{font-size:11px;opacity:.7;margin-bottom:4px}
.sb-name{font-size:15px;font-weight:700}.sb-role{font-size:11px;opacity:.7;margin-top:3px}
.sb-close{position:absolute;top:12px;right:12px;background:rgba(255,255,255,.15);
  border:none;color:#fff;border-radius:6px;padding:4px 10px;font-size:18px;cursor:pointer}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border:none;
  background:transparent;color:#444;font-size:14px;font-weight:500;cursor:pointer;
  width:100%;text-align:left;border-left:3px solid transparent;transition:all .15s}
.nav-item:hover{background:#f5f5f5}
.nav-item.on{color:var(--forest);background:var(--lblue);border-left-color:var(--forest);font-weight:600}
.nav-item .ni{font-size:20px;width:28px;text-align:center;flex-shrink:0}
.nav-sep{height:1px;background:#f0f0f0;margin:4px 0}
/* LAYOUT */
#main{margin-top:52px;min-height:calc(100vh - 52px);overflow-y:auto;overflow-x:hidden}
.page{max-width:740px;margin:0 auto;padding:14px 12px 40px}
.card{background:#fff;border-radius:12px;border:1px solid var(--border);padding:14px;margin-bottom:12px}
.lbl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.inp{width:100%;padding:9px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;outline:none;background:#f7f7f7;transition:border-color .2s}
.inp:focus{border-color:var(--forest);background:#fff}
.inp[readonly]{background:#f0f0f0}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.btn{border:none;border-radius:8px;padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:5px;justify-content:center}
.btn-p{background:var(--forest);color:#fff;width:100%}
.btn-g{background:#f0f0f0;color:#444}
.btn-r{background:var(--red);color:#fff}
.btn-o{background:var(--orange);color:#fff}
.btn-gr{background:var(--green);color:#fff}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:6px;width:auto}
.badge{font-weight:700;padding:3px 10px;border-radius:999px;font-size:13px;display:inline-block;text-align:center;min-width:32px}
.b0{background:#f0f0f0;color:#999}.b1{background:var(--red);color:#fff}
.b2{background:var(--yellow);color:#333}.b3{background:var(--green);color:#fff}
.rbadge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px}
.r-coordinatore{background:#E8F5E9;color:#2E7D32}.r-referente_colonia{background:#E3F2FD;color:#0D47A1}
.r-programmatore{background:#EDE7F6;color:#4527A0}.r-volunteer{background:#F1F8E9;color:#33691E}
.view-toggle{display:flex;border:1.5px solid #ddd;border-radius:8px;overflow:hidden;margin-bottom:12px}
.vt{flex:1;padding:8px;font-size:13px;font-weight:500;border:none;background:#fff;color:var(--muted);cursor:pointer}
.vt.on{background:var(--forest);color:#fff}
.wg{display:grid;grid-template-columns:48px repeat(7,1fr);border:1px solid var(--border);border-radius:10px;overflow:hidden;background:#fff}
.wg-hdr{background:var(--forest);color:#fff;padding:6px 2px;text-align:center;font-size:10px;font-weight:600}
.wg-hdr.tod{background:var(--forest2)}
.wg-lbl{background:#f7f7f7;border-right:1px solid var(--border);border-bottom:1px solid #f0f0f0;padding:5px 2px;font-size:9px;font-weight:600;color:var(--muted);display:flex;align-items:center;justify-content:center;text-align:center}
.wg-cell{border-right:1px solid #f0f0f0;border-bottom:1px solid #f0f0f0;padding:4px 2px;cursor:pointer;min-height:42px;transition:background .15s}
.wg-cell:hover{background:#f0f7e6}.wg-cell.mine{background:var(--lblue)}
.wg-cell.scoperto{background:#FFF3E0;border:1px solid #FFB74D}
.sess-block{border-radius:10px;overflow:hidden;border:1px solid var(--border);margin-bottom:8px}
.sess-hdr{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.sess-body{padding:10px 14px;background:#fff}
.chip{font-size:12px;padding:4px 10px;border-radius:999px;background:#f0f0f0;color:#444;display:inline-block;margin:2px;font-weight:500}
.chip.mine{background:var(--lblue);color:var(--forest);font-weight:700}
.chip.indisp{background:#FFF3E0;color:#E65100;text-decoration:line-through;font-style:italic}
/* COLONIE GRID */
.colony-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.colony-card{border-radius:12px;border:2px solid var(--border);background:#fff;padding:12px;text-align:center;cursor:pointer;transition:all .15s}
.colony-card:hover{border-color:var(--forest);box-shadow:0 3px 10px rgba(45,80,22,.15)}
.colony-card.sel{border-color:var(--forest);background:var(--lblue)}
.colony-icon{font-size:28px;margin-bottom:4px}
.colony-name{font-size:14px;font-weight:700;color:var(--forest)}
.colony-info{font-size:11px;color:var(--muted);margin-top:3px}
/* GATTI */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin-bottom:12px}
.cat-card{border-radius:10px;border:2px solid #ddd;background:#fff;padding:9px;text-align:center;cursor:pointer;transition:all .15s}
.cat-card:hover{border-color:var(--forest);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.cat-card.steril{border-color:var(--lime);background:#F1F8E9}
.cat-icon{font-size:22px}
.cat-name{font-size:12px;font-weight:700;margin-top:3px}
.cat-info{font-size:10px;color:var(--muted);margin-top:2px;line-height:1.4}
/* TABS */
.tab-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:999px;font-size:13px;font-weight:500;border:1.5px solid #ddd;background:#fff;color:var(--muted);cursor:pointer}
.tab.on{background:var(--forest);border-color:var(--forest);color:#fff}
/* TABLE */
.tw{overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
.tbl{border-collapse:collapse;width:100%;font-size:12px;min-width:460px}
.tbl th{padding:8px 10px;background:var(--forest);color:#fff;font-weight:600;white-space:nowrap}
.tbl td{padding:7px 10px;border-bottom:1px solid #f0f0f0;text-align:center}
.tbl td:first-child,.tbl td:nth-child(2){text-align:left;font-weight:600}
.tbl tr:nth-child(even) td{background:#f9fbf5}
/* SHEET */
#sheet-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:700;align-items:flex-end;justify-content:center}
#sheet-overlay.open{display:flex}
#sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:700px;max-height:88vh;overflow-y:auto;padding:0 16px 28px}
.sh-handle{width:36px;height:4px;border-radius:999px;background:#ddd;margin:12px auto 14px}
.ck-group{display:flex;flex-wrap:wrap;gap:6px}
.ck{display:flex;align-items:center;gap:5px;padding:5px 10px;border:1.5px solid #ddd;border-radius:8px;cursor:pointer;font-size:12px;font-weight:500;transition:all .15s;user-select:none}
.ck.on{border-color:var(--forest);background:var(--lblue);color:var(--forest)}
/* STATS */
.stats{display:grid;gap:8px;margin-bottom:12px}
.stat{background:#fff;border-radius:10px;border:1px solid var(--border);padding:12px;text-align:center}
.stat-n{font-size:24px;font-weight:700;color:var(--forest)}.stat-l{font-size:11px;color:var(--muted);margin-top:2px}
.sec-title{font-size:16px;font-weight:700;color:var(--forest);margin-bottom:10px}
.empty{text-align:center;padding:2.5rem;color:var(--muted);font-size:14px}
/* TOAST */
#toast{position:fixed;top:62px;left:50%;transform:translateX(-50%);z-index:999;padding:10px 20px;
  border-radius:8px;font-size:14px;font-weight:500;color:#fff;box-shadow:0 4px 14px rgba(0,0,0,.2);
  pointer-events:none;opacity:0;transition:opacity .25s;white-space:nowrap}
/* LOGIN */
#login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(145deg,#1a3a09,#2D5016,#3a6b1e);padding:20px}
.login-box{background:#fff;border-radius:20px;padding:2rem 1.5rem;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,.25)}
/* ALERT BANNER */
.alert-turni{background:linear-gradient(135deg,#FFF3E0,#FFE0B2);border:2px solid #FFB74D;border-radius:12px;padding:14px;margin-bottom:12px}
.alert-indisp{background:linear-gradient(135deg,#E8F5E9,#C8E6C9);border:2px solid #81C784;border-radius:12px;padding:14px;margin-bottom:12px}
.alert-title{font-size:14px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.alert-item{font-size:12px;padding:5px 0;border-bottom:1px solid rgba(0,0,0,.07);display:flex;justify-content:space-between;align-items:center;gap:6px}
.alert-item:last-child{border-bottom:none}
/* COLONIA BADGE */
.colonia-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:999px;font-size:11px;font-weight:700;background:var(--lblue);color:var(--forest);border:1px solid var(--border)}
</style>

<body>
<script>
// ══ FIREBASE CONFIG ══════════════════════════════════════════════════════════
const FB={
  apiKey:"AIzaSyB6QevuvhcK4rCv88s5GsHFZ4C_xiQpFuo",
  authDomain:"gaia-ambiente.firebaseapp.com",
  projectId:"gaia-ambiente",
  storageBucket:"gaia-ambiente.firebasestorage.app",
  messagingSenderId:"729100261222",
  appId:"1:729100261222:web:a316e957456a718ba25aa7"
};
</script>
<div id="app"></div>
<div id="drawer-overlay"></div>
<div id="sidebar"></div>
<div id="sheet-overlay"><div id="sheet"></div></div>
<div id="toast"></div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getFirestore,collection,doc,addDoc,getDocs,updateDoc,deleteDoc,
  query,where,serverTimestamp,onSnapshot}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
const fba=initializeApp(FB);const db=getFirestore(fba);

// ── COSTANTI ──────────────────────────────────────────────────────────────────
const MONTHS=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
const DOWS=['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];
const SOGLIA_ALERT_GIORNI=15; // avvisa turni scoperti entro 15 giorni

const RUOLI={
  programmatore:{label:'Programmatore',cls:'r-programmatore'},
  coordinatore:{label:'Coordinatore',cls:'r-coordinatore'},
  referente_colonia:{label:'Referente Colonia',cls:'r-referente_colonia'},
  volunteer:{label:'Volontario',cls:'r-volunteer'}
};

// Colonie predefinite (estendibili dall'admin)
const COLONIE_DEFAULT=[
  {id:'solco',nome:'Solco',emoji:'🌿',colore:'#388E3C'},
  {id:'ontani',nome:'Ontani',emoji:'🍂',colore:'#795548'},
];

// ── HELPERS DATE ──────────────────────────────────────────────────────────────
const ymd=(y,m,d)=>`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const today=()=>{const n=new Date();return ymd(n.getFullYear(),n.getMonth()+1,n.getDate());};
const fromYMD=s=>{const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);};
const addDays=(s,n)=>{const d=fromYMD(s);d.setDate(d.getDate()+n);return toYMD(d);};
const toYMD=d=>ymd(d.getFullYear(),d.getMonth()+1,d.getDate());
const monOf=s=>{const d=fromYMD(s);const w=d.getDay();d.setDate(d.getDate()-(w===0?6:w-1));return toYMD(d);};
const wkDays=m=>Array.from({length:7},(_,i)=>addDays(m,i));
const fmtL=s=>fromYMD(s).toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long'});
const fmtS=s=>fromYMD(s).toLocaleDateString('it-IT',{day:'numeric',month:'short'});
const monStart=(y,m)=>ymd(y,m+1,1);
const monEnd=(y,m)=>ymd(y,m+1,new Date(y,m+1,0).getDate());
const daysDiff=(a,b)=>Math.max(0,Math.round((new Date(b)-new Date(a))/86400000));
const normCF=cf=>cf.trim().toUpperCase().replace(/\s/g,'');
const bc=n=>n===0?'b0':n<2?'b1':n===2?'b2':'b3';
const fmtTs=ts=>{if(!ts||!ts.seconds)return'';const d=new Date(ts.seconds*1000);
  return d.toLocaleDateString('it-IT',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});};
const getRuoli=u=>{if(!u)return['volunteer'];if(Array.isArray(u.ruoli)&&u.ruoli.length)return u.ruoli;
  return['volunteer'];};
const can=(u,...roles)=>{if(!u)return false;const ur=getRuoli(u);
  if(ur.includes('programmatore')||ur.includes('coordinatore'))return true;
  if(roles.includes('volunteer'))return true;return roles.some(r=>ur.includes(r));};
const isAdmin=(u)=>u&&(getRuoli(u).includes('programmatore')||getRuoli(u).includes('coordinatore'));
const rlLabel=u=>getRuoli(u).filter(r=>r!=='volunteer').map(r=>RUOLI[r]?.label||r).join(', ')||'Volontario';

// ── STATO APPLICAZIONE ────────────────────────────────────────────────────────
const S={
  screen:'login',user:null,page:'bacheca',calView:'settimanale',
  selDate:today(),selYear:new Date().getFullYear(),selMonth:new Date().getMonth(),
  selWeekMon:monOf(today()),evTab:'banchetti',
  // dati firebase
  vols:[],shifts:[],eventi:[],partecipazioni:[],chest:[],comms:[],
  colonie:[...COLONIE_DEFAULT], // colonie estese dall'admin
  gatti:[],                     // {id, coloniaId, nome, sesso, colore, sterilizzato, note, dataIngresso}
  indisponibilita:[],           // {id, volunteerId, date, coloniaId, motivo, createdAt}
  // UI state
  selColonia:'solco',           // colonia attiva nel calendario
  editVolId:null,               // volontario in modalità modifica
  loginCF:'',loginPin:'',loginErr:'',loginStep:1,loginRimanere:false,loading:false,
  setPinMode:false,setPinNew:'',setPinConf:'',_tmpVol:null,_newComm:false,
  setupNome:'',setupCognome:'',setupCF:'',setupErr:'',setupLoading:false,
  fv:{nome:'',cognome:'',cf:'',ruoli:['volunteer'],coloniaIds:[]},
  fcom:{titolo:'',testo:'',importante:false},
  fev:{titolo:'',data:today(),oraI:'09:00',oraF:'13:00',luogo:'',note:''},
  fch:{negozio:'',indirizzo:'',note:''},
  fcat:{nome:'',sesso:'F',colore:'',sterilizzato:true,note:'',dataIngresso:today(),coloniaId:''},
  findisp:{date:today(),coloniaId:'solco',motivo:''},
  addCom:false,addEv:false,addCh:false,addCat:false,addColonia:false,addIndisp:false,
  fNewColonia:{nome:'',emoji:'🐱'},
  coloniaTab:'gatti',   // tab dentro pagina colonie
  catDetail:null,       // gatto selezionato per dettaglio
  volDetail:null,       // volontario selezionato
  volColoniaFilter:'tutte',
};

// ── REALTIME ──────────────────────────────────────────────────────────────────
let _uns=[];
const clearListeners=()=>{_uns.forEach(u=>u());_uns=[];};
const setupRealtime=()=>{
  clearListeners();
  const watch=(col,arr,pages,sort)=>{
    let primo=true;
    _uns.push(onSnapshot(collection(db,col),snap=>{
      if(primo){primo=false;return;}
      let changed=false;
      snap.docChanges().forEach(ch=>{
        const d={id:ch.doc.id,...ch.doc.data()};
        if(ch.type==='added'&&!S[arr].find(x=>x.id===d.id)){S[arr].push(d);changed=true;}
        if(ch.type==='modified'){const i=S[arr].findIndex(x=>x.id===d.id);if(i>=0){S[arr][i]=d;changed=true;}}
        if(ch.type==='removed'){S[arr]=S[arr].filter(x=>x.id!==ch.doc.id);changed=true;}
      });
      if(changed){if(sort)sort();if(S.screen==='app'&&pages.includes(S.page))render();}
    }));
  };
  watch('turni','shifts',['calendario','io']);
  watch('partecipazioni','partecipazioni',['eventi','io']);
  watch('gatti','gatti',['colonie']);
  watch('indisponibilita','indisponibilita',['calendario','io']);
  {let primo=true;
  _uns.push(onSnapshot(collection(db,'comunicazioni'),snap=>{
    if(primo){primo=false;return;}
    let changed=false;
    snap.docChanges().forEach(ch=>{
      const c={id:ch.doc.id,...ch.doc.data()};
      if(ch.type==='added'&&!S.comms.find(x=>x.id===c.id)){
        S.comms.unshift(c);sortComms();changed=true;
        if(S.user){const ls=+(localStorage.getItem('lsc_'+S.user.id)||0);
          if((c.createdAt?.seconds||0)>ls)S._newComm=true;}
      }
      if(ch.type==='removed'){S.comms=S.comms.filter(x=>x.id!==ch.doc.id);changed=true;}
    });
    if(changed&&S.screen==='app')render();
  }));}
};

// ── FIREBASE CARICAMENTO ──────────────────────────────────────────────────────
const colLoad=async(c,arr)=>{const s=await getDocs(collection(db,c));S[arr]=s.docs.map(d=>({id:d.id,...d.data()}));};
const loadShifts=async(from,to)=>{
  const q=query(collection(db,'turni'),where('date','>=',from),where('date','<=',to));
  const s=await getDocs(q);S.shifts=S.shifts.filter(sh=>sh.date<from||sh.date>to);
  S.shifts.push(...s.docs.map(d=>({id:d.id,...d.data()})));};
const loadCurMon=async()=>{const f=monStart(S.selYear,S.selMonth),t=monEnd(S.selYear,S.selMonth);await loadShifts(f,t);};
const loadYear=async()=>loadShifts(`${S.selYear}-01-01`,`${S.selYear}-12-31`);
const sortComms=()=>S.comms.sort((a,b)=>{if(a.importante&&!b.importante)return -1;if(!a.importante&&b.importante)return 1;return(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0);});

const loadAll=async()=>{
  await Promise.all([
    colLoad('volunteers','vols'),loadCurMon(),
    colLoad('eventi','eventi'),colLoad('chest','chest'),
    colLoad('partecipazioni','partecipazioni'),
    colLoad('comunicazioni','comms'),
    colLoad('gatti','gatti'),
    colLoad('indisponibilita','indisponibilita'),
    loadYear()
  ]);
  // carica colonie custom da Firebase (merge con default)
  try{
    const snap=await getDocs(collection(db,'colonie'));
    const dbCols=snap.docs.map(d=>({id:d.id,...d.data()}));
    // unisci: default non override da DB, custom solo da DB
    const defaultIds=COLONIE_DEFAULT.map(c=>c.id);
    const extra=dbCols.filter(c=>!defaultIds.includes(c.id));
    S.colonie=[...COLONIE_DEFAULT,...extra];
  }catch(e){}
  S.vols.sort((a,b)=>a.cognome.localeCompare(b.cognome));
  sortComms();
};

const findByCF=async cf=>{const q=query(collection(db,'volunteers'),where('codiceFiscale','==',cf));

// ── AUTH ──────────────────────────────────────────────────────────────────────
const doLogin=async()=>{
  if(S.loginStep===1){
    const cf=normCF(S.loginCF);
    if(!cf){S.loginErr='Inserisci il codice fiscale';render();return;}
    S.loading=true;render();
    try{
      const all=await getDocs(collection(db,'volunteers'));
      if(all.empty){S.screen='setup';S.setupCF=cf;S.loading=false;render();return;}
      const vol=await findByCF(cf);
      if(!vol){S.loginErr='Codice fiscale non trovato.';S.loading=false;render();return;}
      if(!vol.approved){S.loginErr='Accesso non abilitato.';S.loading=false;render();return;}
      if(!vol.pin){S._tmpVol=vol;S.setPinMode=true;S.loading=false;render();return;}
      S.loginStep=2;S._tmpVol=vol;S.loginErr='';
    }catch(e){S.loginErr='Errore di connessione.';}
    S.loading=false;render();
  }else{
    if(!S.loginPin||S.loginPin.length<4){S.loginErr='PIN minimo 4 cifre';render();return;}
    if(S.loginPin!==S._tmpVol.pin){S.loginErr='PIN non corretto.';render();return;}
    S.loading=true;render();
    try{
      await afterLogin(S._tmpVol);
      if(S.loginRimanere)localStorage.setItem('savedUser',S._tmpVol.id);
      S.loginStep=1;S.loginCF='';S.loginPin='';S._tmpVol=null;
    }catch(e){S.loginErr='Errore.';}
    S.loading=false;render();}};

  if(S.setPinNew.length<4){toast('PIN minimo 4 cifre','err');return;}
  if(S.setPinNew!==S.setPinConf){toast('I PIN non coincidono','err');return;}
  S.loading=true;render();
  try{
    await updateDoc(doc(db,'volunteers',S._tmpVol.id),{pin:S.setPinNew});
    S._tmpVol.pin=S.setPinNew;
    await afterLogin(S._tmpVol);
    if(S.loginRimanere)localStorage.setItem('savedUser',S._tmpVol.id);
    S.setPinMode=false;S.setPinNew='';S.setPinConf='';S._tmpVol=null;

// ── ALERT TURNI SCOPERTI ──────────────────────────────────────────────────────
const getTurniScoperti=()=>{
  const results=[];
  const tod=today();
  const limite=addDays(tod,SOGLIA_ALERT_GIORNI);
  // per ogni giorno da oggi+1 a oggi+15, per ogni colonia, verifica se ci sono turni
  let d=addDays(tod,1);
  while(d<=limite){
    for(const col of S.colonie){
      const ha=S.shifts.find(s=>s.date===d&&s.coloniaId===col.id);
      if(!ha){results.push({date:d,coloniaId:col.id,coloniaNome:col.nome,emoji:col.emoji});}
    }
    d=addDays(d,1);
  }
  return results;};

// ── CHECK INDISPONIBILITA SUI TURNI ──────────────────────────────────────────
const getConflittiIndisp=()=>{
  // turni assegnati a un volontario che si è segnato indisponibile
  const results=[];
  for(const sh of S.shifts){
    if(sh.date<today())continue;
    const indisp=S.indisponibilita.find(i=>i.volunteerId===sh.volunteerId&&i.date===sh.date&&i.coloniaId===sh.coloniaId);
    if(indisp)results.push({shift:sh,indisp});
  }
  return results;};

// ── NOTIFICHE PUSH ────────────────────────────────────────────────────────────
const sendPushNotification=async(title,message,tag)=>{
  try{
    const snap=await getDocs(collection(db,'push_subscriptions'));
    if(snap.empty)return;
    const subscriptions=snap.docs.map(d=>d.data());
    const res=await fetch('/.netlify/functions/send-push',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({subscriptions,title,message,tag})
    });
    if(res.ok){const data=await res.json();
      if(data.expired?.length){const batch=snap.docs.filter(d=>data.expired.includes(d.data().endpoint));
        await Promise.all(batch.map(d=>deleteDoc(doc(db,'push_subscriptions',d.id))));}
      console.log('[PUSH] Inviate:',data.ok,'ok,',data.fail,'fallite');
    }
  }catch(e){console.warn('[PUSH] Errore:',e);}};

// ── EXCEL PRESENZE ────────────────────────────────────────────────────────────
const doExcel=()=>{
  const wb=XLSX.utils.book_new();
  const hS={fill:{patternType:'solid',fgColor:{rgb:'FF2D5016'}},font:{bold:true,color:{rgb:'FFFFFFFF'}},alignment:{horizontal:'center'}};
  const cS=n=>{const rgb=n===0?null:n<2?'FFFF5252':n===2?'FFFFC107':'FF4CAF50';return{fill:rgb?{patternType:'solid',fgColor:{rgb}}:{},alignment:{horizontal:'center'}};};
  for(const col of S.colonie){
    const hdr=['Cognome','Nome','Ruoli',...MONTHS,'Totale'];
    const rows=[hdr,...S.vols.map(v=>{
      const r=rlLabel(v);
      const counts=MONTHS.map((_,mi)=>S.shifts.filter(s=>s.volunteerId===v.id&&s.coloniaId===col.id&&s.date.startsWith(`${S.selYear}-${String(mi+1).padStart(2,'0')}`)).length);
      return[v.cognome,v.nome,r,...counts,counts.reduce((a,b)=>a+b,0)];
    }).sort((a,b)=>b[b.length-1]-a[b.length-1])];
    const ws=XLSX.utils.aoa_to_sheet(rows);
    ws['!cols']=[{wch:20},{wch:15},{wch:18},...MONTHS.map(()=>({wch:6})),{wch:7}];
    for(let c=0;c<hdr.length;c++){const r=XLSX.utils.encode_cell({r:0,c});if(ws[r])ws[r].s=hS;}
    for(let r=1;r<rows.length;r++)for(let c=3;c<rows[r].length;c++){const ref=XLSX.utils.encode_cell({r,c});if(ws[ref])ws[ref].s=cS(rows[r][c]);}
    XLSX.utils.book_append_sheet(wb,ws,col.nome.substring(0,31));
  }
  XLSX.writeFile(wb,`presenze_gaia_${S.selYear}.xlsx`,{cellStyles:true});toast('Excel scaricato');};

<label style="display:flex;align-items:center;gap:8px;margin-bottom:12px;cursor:pointer"><input type="checkbox" id="fComImp" ${S.fcom.importante?'checked':''} style="width:16px;height:16px"><span style="font-size:13px;font-weight:500">⭐ Importante</span></label>

${c.importante?'<span>⭐</span>':''}

const calHTML=()=>{
  const isP=can(S.user,'coordinatore','referente_colonia');

  const colSel=`<div class="tab-row">${S.colonie.map(c=>`<button class="tab${S.selColonia===c.id?' on':''}" data-colsel="${c.id}">${c.emoji} ${c.nome}</button>`).join('')}</div>`;
  return `${colSel}<div class="view-toggle">
<button class="vt${S.calView==='settimanale'?' on':''}" data-cv="settimanale">Settimanale</button>
<button class="vt${S.calView==='giornaliero'?' on':''}" data-cv="giornaliero">Giornaliero</button>
</div>${S.calView==='settimanale'?calSettHTML():calGiornoHTML()}`;};

const calSettHTML=()=>{
  const days=wkDays(S.selWeekMon),tod=today();
  const prev=addDays(S.selWeekMon,-7),next=addDays(S.selWeekMon,7);
  const col=S.selColonia;
  const scop=getTurniScoperti();
  const rows=`
<div class="wg-lbl">Turno</div>
${days.map(d=>{
  const ns=S.shifts.filter(s=>s.date===d&&s.coloniaId===col);
  const haIndisp=S.indisponibilita.some(i=>i.date===d&&i.coloniaId===col);
  const isScopert=scop.some(s=>s.date===d&&s.coloniaId===col);
  return `<div class="wg-cell${isScopert?' scoperto':''}" data-openday="${d}">
${ns.length===0?`<div style="color:#bbb;font-size:10px;text-align:center;padding:4px">${haIndisp?'⚠️':''}</div>`:''}
${ns.map(s=>{
  const mine=s.volunteerId===S.user.id;
  const ind=S.indisponibilita.find(i=>i.volunteerId===s.volunteerId&&i.date===d&&i.coloniaId===col);
  return`<div style="font-size:10px;padding:2px 3px;border-radius:4px;margin:1px;${mine?'background:var(--lblue);color:var(--forest);font-weight:700':'background:#f0f0f0;color:#555'}${ind?';text-decoration:line-through;opacity:.6':''}" title="${s.volunteerCognome} ${s.volunteerNome}">
    ${s.volunteerCognome.substring(0,7)}${ind?' ⚠️':''}
  </div>`;}).join('')}
</div>`;}).join('')}`;
  return `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
<button class="btn btn-g btn-sm" id="prevW" data-mon="${prev}">‹ Prec</button>
<div style="font-size:13px;font-weight:700;color:var(--forest)">${fmtS(S.selWeekMon)} – ${fmtS(addDays(S.selWeekMon,6))}</div>
<button class="btn btn-g btn-sm" id="nextW" data-mon="${next}">Succ ›</button>
</div>
<div class="wg">
<div class="wg-hdr"></div>${days.map(d=>`<div class="wg-hdr${d===tod?' tod':''}">${DOWS[(new Date(d).getDay()+6)%7]}<br>${fromYMD(d).getDate()}</div>`).join('')}
${rows}
</div>
<div style="font-size:11px;color:var(--muted);margin-top:8px">🟡 = turno scoperto &nbsp;⚠️ = indisponibilità segnalata &nbsp; Tocca un giorno per dettagli</div>`;};

const calGiornoHTML=()=>{
  const d=S.selDate,tod=today(),col=S.selColonia;
  const colObj=S.colonie.find(c=>c.id===col);
  const turni=S.shifts.filter(s=>s.date===d&&s.coloniaId===col);
  const indisp=S.indisponibilita.filter(i=>i.date===d&&i.coloniaId===col);
  const isP=can(S.user,'coordinatore','referente_colonia');
  const isMine=turni.find(s=>s.volunteerId===S.user.id);
  const myIndisp=indisp.find(i=>i.volunteerId===S.user.id);
  // Un volontario è "di questa colonia" se ha coloniaId nell'array o è admin
  const sonoInQuestaColonia=isP||(S.user.coloniaIds||[]).includes(col);
  // Dropdown admin: mostra TUTTI i volontari approvati non ancora in turno
  const tuttiVols=S.vols.filter(v=>v.approved&&!turni.find(s=>s.volunteerId===v.id));
  return `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
<button class="btn btn-g btn-sm" id="prevD" data-date="${addDays(d,-1)}">‹ Prec</button>
<div style="font-size:13px;font-weight:700;color:var(--forest)">${fmtL(d)}</div>
<button class="btn btn-g btn-sm" id="nextD" data-date="${addDays(d,1)}">Succ ›</button>
</div>
${d!==tod?`<button class="btn btn-g btn-sm" id="btnToday" style="width:100%;margin-bottom:10px">Oggi</button>`:''}
<div class="card">
<div style="margin-bottom:10px">
<div style="font-size:14px;font-weight:700;margin-bottom:8px">${colObj?.emoji||'🐱'} Turno ${colObj?.nome||col}</div>
${d>=tod?`<div style="display:flex;flex-direction:column;gap:6px">
${
  // Caso 1: già iscritto
  isMine
  ? `<div style="font-size:12px;color:var(--forest);font-weight:600;background:var(--lblue);border-radius:8px;padding:8px">✅ Sei iscritto a questo turno</div>`
  : ''
}
${
  // Caso 2: iscritto E ha già segnalato indisponibilità
  isMine&&myIndisp
  ? `<div style="font-size:12px;color:var(--orange);font-weight:600;background:#FFF8F0;border-radius:8px;padding:8px">⚠️ Hai segnalato indisponibilità</div>`
  : ''
}
${
  // Caso 3: iscritto E non ha ancora segnalato indisponibilità → mostra "Non posso venire"
  isMine&&!myIndisp
  ? `<button class="btn btn-o btn-sm" data-addindisp="${d}" data-col="${col}" style="width:100%">⚠️ Non posso venire</button>`
  : ''
}
${
  // Caso 4: non iscritto, è di questa colonia, non ha segnalato indisponibilità → "Sono disponibile"
  !isMine&&!myIndisp&&sonoInQuestaColonia
  ? `<button class="btn btn-gr btn-sm" data-addshift="${d}" data-col="${col}" style="width:100%">✅ Sono disponibile</button>`
  : ''
}
${
  // Caso 5: non iscritto, NON è di questa colonia, non è admin → messaggio informativo
  !isMine&&!sonoInQuestaColonia
  ? `<div style="font-size:12px;color:var(--muted);font-style:italic;padding:4px 0">Non sei assegnato a questa colonia — solo la coordinatrice può aggiungerti</div>`
  : ''
}
${
  // Caso 6: non iscritto, ha già segnalato indisponibilità (da pagina "Io")
  !isMine&&myIndisp
  ? `<div style="font-size:12px;color:var(--orange);font-weight:600;background:#FFF8F0;border-radius:8px;padding:8px">⚠️ Hai segnalato indisponibilità per questo giorno</div>`
  : ''
}
</div>`:''}
</div>
${turni.length===0?`<div style="color:var(--muted);font-size:13px;padding:4px 0">Nessun volontario iscritto</div>`:''}
${turni.map(s=>{
  const mine=s.volunteerId===S.user.id;
  const ind=indisp.find(i=>i.volunteerId===s.volunteerId);
  return`<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;padding:7px 0;border-bottom:1px solid #f0f0f0">
    <div>
      <span style="font-size:13px;font-weight:${mine?'700':'500'};${ind?'text-decoration:line-through;color:var(--orange)':''}">${mine?'👤 ':''}${s.volunteerCognome} ${s.volunteerNome}</span>
      ${ind?`<span style="font-size:11px;color:var(--orange);display:block;margin-top:2px">⚠️ Indisponibile${ind.motivo?' — '+ind.motivo:''}</span>`:''}
    </div>
    <div style="display:flex;gap:4px;flex-shrink:0">
      ${mine&&d>=tod&&!ind?`<button class="btn btn-r btn-sm" data-rmsid="${s.id}">Rimuoviti</button>`:''}
      ${isP&&!mine&&d>=tod?`<button class="btn btn-r btn-sm" data-rmsid="${s.id}">🗑</button>`:''}
    </div>
  </div>`;}).join('')}
${isP&&d>=tod?`<div style="margin-top:12px;border-top:1px solid #f0f0f0;padding-top:10px">
<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:6px">Aggiungi volontario al turno</div>
<div style="display:flex;gap:6px">
<select id="addVolSel_${d}" class="inp" style="flex:1;font-size:13px">
  <option value="">— Seleziona volontario —</option>
  ${tuttiVols.map(v=>{
    const suaColonie=(v.coloniaIds||[]).includes(col)?` ✓`:'';
    return`<option value="${v.id}">${v.cognome} ${v.nome}${suaColonie}</option>`;
  }).join('')}
</select>
<button class="btn btn-p btn-sm" data-addvolshift="${d}" data-col="${col}" style="white-space:nowrap">+ Aggiungi</button>
</div>
<div style="font-size:10px;color:var(--muted);margin-top:4px">✓ = assegnato a questa colonia</div>
</div>`:''}
</div>
${indisp.length?`<div class="card">
<div style="font-size:13px;font-weight:700;margin-bottom:8px">⚠️ Indisponibilità segnalate</div>
${indisp.map(i=>`<div style="font-size:12px;padding:5px 0;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;gap:8px">
<span><strong>${i.volunteerCognome} ${i.volunteerNome}</strong>${i.motivo?' — '+i.motivo:''}</span>
${(S.user.id===i.volunteerId||isP)?`<button class="btn btn-r btn-sm" data-remindisp="${i.id}">🗑</button>`:''}
</div>`).join('')}
</div>`:''}`;};

// ── PWA ───────────────────────────────────────────────────────────────────────
window._canInstall=false;
let _deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();_deferredPrompt=e;window._canInstall=true;if(S.screen==='app'){render();buildSidebar();}});
window.installApp=async()=>{if(!_deferredPrompt)return;_deferredPrompt.prompt();const r=await _deferredPrompt.userChoice;if(r.outcome==='accepted')window._canInstall=false;_deferredPrompt=null;};

// ── SERVICE WORKER + PUSH ─────────────────────────────────────────────────────
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').then(reg=>{
    window.richiestaNotifiche=async()=>{
      const perm=await Notification.requestPermission();
      if(perm!=='granted')return false;
      try{
        const VAPID_PUB='BJAM0c-fDZAKIMjq-h2RZCLFYowXUb-NSgaovO5Sb7SpzuAF1YsY6sRPHSZrL_zGkWRB0br9_1v8MLEynvhXx_U';
        const sub=await reg.pushManager.subscribe({
          userVisibleOnly:true,
          applicationServerKey:VAPID_PUB
        });
        const existing=await getDocs(query(collection(db,'push_subscriptions'),where('endpoint','==',sub.endpoint)));
        if(existing.empty&&S.user){
          await addDoc(collection(db,'push_subscriptions'),{
            ...sub.toJSON(),userId:S.user.id,createdAt:serverTimestamp()
          });
        }
        return true;
      }catch(e){console.error('[PUSH]',e);return false;}
    };
  }).catch(e=>console.error('[SW]',e));
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
(async()=>{
  const savedId=localStorage.getItem('savedUser');
  if(savedId){
    try{
      const s=await getDocs(collection(db,'volunteers'));
      const vDoc=s.docs.find(d=>d.id===savedId);
      if(vDoc&&vDoc.data().approved){await afterLogin({id:vDoc.id,...vDoc.data()});render();return;}
      else localStorage.removeItem('savedUser');
    }catch(e){localStorage.removeItem('savedUser');}
  }
  render();
})();
